name: Release And JitPack Publish

on:
  push:
    branches:
      - "release/*"
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version (e.g. 1.0.24). If empty, use branch name release/x.y.z."
        required: false
        type: string

permissions:
  contents: write

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.version.outputs.release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Release Version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          INPUT_VERSION="${{ github.event.inputs.release_version }}"
          if [ -n "${INPUT_VERSION:-}" ]; then
            RELEASE_VERSION="$INPUT_VERSION"
          else
            RELEASE_VERSION="${GITHUB_REF_NAME#release/}"
          fi

          if ! [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release version: $RELEASE_VERSION"
            echo "Expected format: x.y.z (example: 1.0.24)"
            exit 1
          fi

          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: $RELEASE_VERSION"

      - name: Verify sdk/build.gradle.kts Version
        shell: bash
        run: |
          set -euo pipefail
          MAJOR=$(grep -E '^val versionMajor = ' sdk/build.gradle.kts | awk '{print $4}')
          MINOR=$(grep -E '^val versionMinor = ' sdk/build.gradle.kts | awk '{print $4}')
          PATCH=$(grep -E '^val versionPatch = ' sdk/build.gradle.kts | awk '{print $4}')
          SDK_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          RELEASE_VERSION="${{ steps.version.outputs.release_version }}"

          echo "sdk version: $SDK_VERSION"
          echo "release version: $RELEASE_VERSION"
          if [ "$SDK_VERSION" != "$RELEASE_VERSION" ]; then
            echo "Version mismatch: sdk/build.gradle.kts($SDK_VERSION) != release branch/tag($RELEASE_VERSION)"
            exit 1
          fi

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run SDK Unit Tests
        run: ./gradlew :sdk:testDebugUnitTest :sdk:testReleaseUnitTest --stacktrace --no-daemon

      - name: Publish Check To Maven Local
        run: ./gradlew :sdk:publishToMavenLocal -x test --stacktrace --no-daemon

  tag-and-trigger-jitpack:
    runs-on: ubuntu-latest
    needs: validate-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create/Verify Tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.validate-and-test.outputs.release_version }}"
          git fetch --tags --force

          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            TAG_SHA=$(git rev-list -n 1 "$TAG")
            if [ "$TAG_SHA" != "$GITHUB_SHA" ]; then
              echo "Tag $TAG already exists on different commit: $TAG_SHA"
              exit 1
            fi
            echo "Tag $TAG already exists on current commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "release $TAG" "$GITHUB_SHA"
          git push origin "$TAG"
          echo "Pushed tag: $TAG"

      - name: Trigger JitPack Build (warm-up)
        id: jitpack
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.validate-and-test.outputs.release_version }}"
          URL="https://jitpack.io/com/github/tjlabs/TJLabsResource-sdk-android/${TAG}/build.log"
          echo "Trigger URL: $URL"
          curl -sSL "$URL" -o jitpack-build.log
          tail -n 120 jitpack-build.log || true

      - name: Upload JitPack Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jitpack-build-log-${{ needs.validate-and-test.outputs.release_version }}
          path: jitpack-build.log
